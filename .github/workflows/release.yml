name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: get-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: npm ci && npm run release

      - name: Create ZIP
        run: cd build && zip -r ../age-of-sigmar-soulbound.zip .

      - name: Patch system.json URLs
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          jq \
            --arg tag "$TAG" \
            --arg dl "https://github.com/pfizrak/AoS-Soulbound-FoundryVTT/releases/download/$TAG/age-of-sigmar-soulbound.zip" \
            --arg mf "https://github.com/pfizrak/AoS-Soulbound-FoundryVTT/releases/latest/download/system.json" \
            '.download = $dl | .manifest = $mf' \
            build/system.json > system-release.json
          mv system-release.json build/system.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            age-of-sigmar-soulbound.zip \
            build/system.json \
            --title "$TAG" \
            --draft=false
